<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Forge</title>

  <!-- Favicons — versioned to bust browser/Arc caches -->
  <link rel="icon" href="/favicon.svg?v=5" type="image/svg+xml">
  <link rel="icon" href="/apple-touch-icon.png?v=5" type="image/png" sizes="512x512">
  <link rel="shortcut icon" href="/apple-touch-icon.png?v=5" type="image/png">
  <link rel="apple-touch-icon" sizes="512x512" href="/apple-touch-icon.png?v=5">
  <link rel="manifest" href="/manifest.json?v=5">

  <!-- Theme / PWA -->
  <meta name="theme-color" content="#1c1228">
  <meta name="color-scheme" content="dark">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Forge">
  <meta name="application-name" content="Forge">
  <meta name="msapplication-TileColor" content="#1c1228">

  <!-- SEO -->
  <meta name="description" content="Forge is the social network built for gamers. Connect across every platform, share your gaming moments, find groups with LFG flares, and discover new games and communities.">
  <meta name="keywords" content="gaming social network, gamer community, LFG, looking for group, gaming friends, game discovery, cross-platform gaming, gaming profile">
  <meta name="author" content="Forge">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://www.forge-social.app">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Forge">
  <meta property="og:locale" content="en_US">
  <meta property="og:title" content="Forge">
  <meta property="og:description" content="Connect with gamers across every platform. Share your gaming moments, find groups with LFG flares, and join communities on Forge.">
  <meta property="og:image" content="https://www.forge-social.app/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="Forge">
  <meta property="og:url" content="https://www.forge-social.app">

  <!-- Twitter / X Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:site" content="@forgesocial">
  <meta name="twitter:title" content="Forge">
  <meta name="twitter:description" content="Connect with gamers across every platform. Share your gaming moments, find groups with LFG flares, and join communities on Forge.">
  <meta name="twitter:image" content="https://www.forge-social.app/og-image.png">
  <meta name="twitter:image:alt" content="Forge">

  <!-- JSON-LD structured data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Forge",
    "url": "https://www.forge-social.app",
    "description": "Forge is the social network built for gamers. Connect across every platform, share your gaming moments, find groups with LFG flares, and discover new games and communities.",
    "applicationCategory": "SocialNetworkingApplication",
    "operatingSystem": "Web, iOS, Android",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "USD"
    },
    "logo": "https://www.forge-social.app/apple-touch-icon.png",
    "image": "https://www.forge-social.app/og-image.png"
  }
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
